version: '3.8'

services:
  potential-nav:
    image: potential-nav:0.0
    container_name: potential-nav
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=10  # 添加此行，确保所有 ROS2 容器使用相同 domain ID
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    stdin_open: true
    tty: true
    privileged: true